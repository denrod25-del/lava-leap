; Lava Leap — export presets (seed). The Godot editor is the source of truth and
; will normalise/fill any missing options the first time you open Project > Export.
; Build outputs go to ../builds/<platform>/ which is gitignored. See EXPORT.md for
; the full per-platform guide (templates, Android SDK, Raspberry Pi, controllers).

[preset.0]

name="Windows Desktop"
platform="Windows Desktop"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="../builds/windows/LavaLeap.exe"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

binary_format/architecture="x86_64"
application/product_name="Lava Leap"
application/company_name="Lava Leap"
application/file_version="1.0.0"
application/product_version="1.0.0"
codesign/enable=false

