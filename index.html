<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ff4d00" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="description" content="Lava Leap — an arcade lava-climber. Outrun the rising lava, stomp enemies, chain combos, and face the Lava Titan." />
    <meta property="og:title" content="Lava Leap" />
    <meta property="og:description" content="Climb. Outrun the lava. Face the Titan." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <title>Lava Leap</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; }
      /* touch-action: manipulation removes the ~300ms tap delay some mobile WebViews add. */
      #game { display: flex; justify-content: center; align-items: center; height: 100%;
              padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
              box-sizing: border-box; touch-action: manipulation; }
      #game canvas { touch-action: manipulation; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
